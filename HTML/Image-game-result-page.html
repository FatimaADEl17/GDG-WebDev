<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Guessing Game Final Page</title>

  <!--fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../CSS/Image-game-result-page.css">

</head>

<body>

      <!-- ================= NAVBAR ================= -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <!-- Logo -->
            <img src="../Images/colorful-logo.png" alt="logo" class="h-10">

            <!-- Links -->
            <div class="hidden md:flex items-center gap-8 font-semibold text-gray-600">
                <a href="main page.html" class="hover:text-[#0078BF]">الرئيسية</a>
                <a href="main page.html#about" class="hover:text-[#0078BF]">من نحن</a>
                <a href="main page.html#goals" class="hover:text-[#0078BF]">أهدافنا</a>
                <a href="main page.html#games" class="hover:text-[#0078BF]">الألعاب</a>
            </div>

        </div>
    </nav>

  <div class="decorations"></div>

  <!--buttons container-->
  <div class="buttons">
    <div class="playAgain-div">
      <a>
        <button class="playAgain-button">
        Play Again
        </button>
      </a>

    </div>

    <div class="backHome-div">
      <a href="main page.html">
        <button class="backHome-button" >
        Back to Home
        </button>
     </a>
    </div>
  </div>

  <!--result container-->
  <div class="result-div">
    <div class="logo">
      <img src="../images/google-logo.png" class="google-logo">
    </div>

    <div class="header-block">
      <h1 class="header">
      Image Guessing 
      <span class="blue">G</span><span class="red">a</span><span class="yellow">m</span><span class="green">e</span>
      </h1>
    </div>

    <div class="center-block">
      <h2 class="result-message js-result-message"></h2>
      <hr class="divider" />
      <p class="score">Score: <span class="js-score"></span> points</p>
    </div>

    <h3 class="game-stat"><span class="info">ⓘ</span> Game Statistics</h3>
    <p class="stat">correct words: <span class="js-correct"></span></p>
    <p class="stat">Fastest Answer: <span class="js-time"></span>s</p>
  </div>


  <script src="../js/image-game-result-page.js"></script>
  
</body>
</html>

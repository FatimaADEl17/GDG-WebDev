<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Guessing Game</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../CSS/image-game.css">
</head>

<body>

  <!-- ================= NAVBAR ================= -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <!-- Logo -->
            <img src="../Images/colorful-logo.png" alt="logo" class="h-10">

            <!-- Links -->
            <div class="hidden md:flex items-center gap-8 font-semibold text-gray-600">
                <a href="main page.html" class="hover:text-[#0078BF]">الرئيسية</a>
                <a href="main page.html#about" class="hover:text-[#0078BF]">من نحن</a>
                <a href="main page.html#goals" class="hover:text-[#0078BF]">أهدافنا</a>
                <a href="main page.html#games" class="hover:text-[#0078BF]">الألعاب</a>
            </div>

        </div>
    </nav>
  <main class="page">
    <section class="card">

      <!-- Logo Only -->
      <header class="header">
        <img src="../images/logo.png" alt="GDG Logo" class="logo-only" />
      </header>

      <!-- Title -->
      <h1 class="title">
        Image Guessing
        <span class="game-word">
          <span class="g">G</span><span class="a">a</span><span class="m">m</span><span class="e">e</span>
        </span>
      </h1>

      <p class="subtitle">Guess the image before it becomes clear.</p>

      <!-- Image Placeholder -->
      <div class="placeholder">
        <img src="../images/guess.png" alt="Pixelated placeholder" class="placeholder-img" />
        <div class="placeholder">
  <img src="../images/guess.png" alt="Pixelated placeholder" class="placeholder-img" />
</div>
      </div>

      <button class="start-btn">Start Game</button>
      <a class="return-link" href="#">Return home</a>

    </section>
  </main>

  <script src="../JS/image-game.js"></script>
</body>
</html>
